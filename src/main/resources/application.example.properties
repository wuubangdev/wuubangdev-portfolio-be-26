spring.application.name=portfolio

# ==============================================================
# DATABASE CONFIGURATION (MySQL Classic - Port 3306)
# ==============================================================
# URL k?t n?i: jdbc:mysql://<host>:<port>/<database_name>
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================================================
# JPA / HIBERNATE CONFIGURATION
# ==============================================================
# update: T? ??ng t?o b?ng ho?c thĻm c?t m?i d?a trĻn Entity (R?t h?p ?? dev)
spring.jpa.hibernate.ddl-auto=update

# Hi?n th? SQL ra Console ?? debug cho d?
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Database Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==============================================================
# CONNECTION POOL (T∙y ch?n - Gi·p app ch?y m??t h?n)
# ==============================================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000